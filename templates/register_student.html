{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Register Student</h4>
        <form method="post">
          <div class="row gy-3">
            <div class="col-md-6">
              <label class="form-label">Student Name</label>
              <input class="form-control" name="name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Username</label>
              <input class="form-control" name="username" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Password</label>
              <input class="form-control" name="password" type="password" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Form Level</label>
              <select class="form-select" name="form_level" required>
                <option>Form 5</option>
                <option>Form 6</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Combination</label>
              <input class="form-control" name="combination" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Attendance %</label>
              <input class="form-control" name="attendance_rate" type="number" min="0" max="100" value="90" required>
            </div>
          </div>
          <div class="mt-4">
            <button class="btn btn-primary">Save Student</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

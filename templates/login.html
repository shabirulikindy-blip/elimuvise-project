{% extends 'base.html' %}
{% block content %}
<style>
  .login-card {
    border-radius: 1.5rem;
    background: var(--surface-strong);
    box-shadow: 0 32px 64px rgba(15, 23, 42, 0.1);
    border: 1px solid rgba(148, 163, 184, 0.1);
  }
  .input-group-text {
    background-color: rgba(91, 125, 247, 0.04);
    border-color: rgba(148, 163, 184, 0.25);
    color: var(--text-secondary);
    border-radius: 1rem 0 0 1rem !important;
  }
  .form-control-with-icon {
    border-radius: 0 1rem 1rem 0 !important;
  }
  .password-toggle {
    cursor: pointer;
    background: transparent;
    border-left: none;
    border-radius: 0 1rem 1rem 0 !important;
  }
  .form-control-password {
    border-right: none;
    border-radius: 0 !important;
  }
  .login-header-icon {
    font-size: 3rem;
    background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 1rem;
  }
</style>

<div class="row justify-content-center">
  <div class="col-lg-5 col-md-7 col-sm-10">
    <div class="card login-card shadow-lg border-0 my-5">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="login-header-icon"><i class="bi bi-shield-lock"></i></div>
          <h3 class="fw-extrabold text-primary">Role-Based Login</h3>
          <p class="text-muted">Enter your registered email and password to access the portal</p>
        </div>

        <form method="post" class="needs-validation" novalidate>
          {% csrf_token %}
          
          <!-- Email / Username field -->
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="text" class="form-control form-control-with-icon" id="email" name="email" placeholder="name@school.com" required>
            </div>
          </div>

          <!-- Password field -->
          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
              <label for="password" class="form-label">Password</label>
            </div>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control form-control-password" id="password" name="password" placeholder="••••••••" required>
              <button class="btn btn-outline-secondary password-toggle" type="button" onclick="togglePassword(this)"><i class="bi bi-eye"></i></button>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold mb-3">
            Sign In <i class="bi bi-box-arrow-in-right ms-1"></i>
          </button>
        </form>

        <div class="mt-4 text-center">
          <p class="text-muted mb-2">Don't have an account? <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none">Register here</a></p>
          <a href="{% url 'index' %}" class="text-secondary text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function togglePassword(btn) {
    const input = btn.previousElementSibling;
    const icon = btn.querySelector('i');
    if (input.type === "password") {
      input.type = "text";
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      input.type = "password";
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  }
</script>
{% endblock %}
